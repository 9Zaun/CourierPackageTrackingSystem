<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lost Package Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div class="bg"></div>

<div class="page-container">

    <h1>Lost Package Management</h1>

    <div class="nav">
        <a th:href="@{/dashboard}">← Dashboard</a>
        <a th:href="@{/}">← Home</a>
    </div>

    <p th:if="${message}" class="flash-message" th:text="${message}"></p>

    <!-- FLAG A PACKAGE -->
    <div class="outer">
        <div class="inner">

            <h2>Flag a Package as Lost</h2>
            <p>Use when a delivery agent reports a missing package.</p>

            <form th:action="@{/lost/mark}" method="post">
                <div class="grid">
                    <div class="input-box">
                        <label>Package ID</label>
                        <input type="text" name="packageId" placeholder="Enter Package ID" required/>
                    </div>
                    <div class="input-box">
                        <label>Agent Name</label>
                        <input type="text" name="agentName" placeholder="Enter Agent Name" required/>
                    </div>
                </div>
                <button type="submit" class="btn-submit">⚠ Mark as Lost</button>
            </form>

        </div>
    </div>

    <!-- CURRENT LOST PACKAGES -->
    <div class="outer">
        <div class="inner">

            <h2>Current Lost Packages</h2>

            <p th:if="${lostTickets == null or #lists.isEmpty(lostTickets)}">
                No lost packages at this time.
            </p>

            <table th:if="${lostTickets != null and not #lists.isEmpty(lostTickets)}">
                <thead>
                    <tr>
                        <th>Package ID</th>
                        <th>Last Known Hub</th>
                        <th>Route ID</th>
                        <th>Flagged At Step</th>
                        <th>Resolve</th>
                        <th>Terminate</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ticket : ${lostTickets}">
                        <td th:text="${ticket.packageId}"></td>
                        <td th:text="${ticket.lastKnownCity}"></td>
                        <td th:text="${ticket.routeId}"></td>
                        <td th:text="${ticket.lostAtStep}"></td>
                        <td>
                            <form th:action="@{/lost/resolve}" method="post" style="display:inline;">
                                <input type="hidden" name="packageId" th:value="${ticket.packageId}"/>
                                <button type="submit" class="btn-resolve">Resolve ✔</button>
                            </form>
                        </td>
                        <td>
                            <form th:action="@{/lost/terminate}" method="post" style="display:inline;">
                                <input type="hidden" name="packageId" th:value="${ticket.packageId}"/>
                                <button type="submit" class="btn-danger">Terminate</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

</body>
</html>
